<!doctype html><html><head><meta charset="utf-8"><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased}
.stage{width:1500px;height:500px;position:relative;overflow:hidden;background:#0A0B05;color:#fff}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(217,255,77,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(217,255,77,.05) 1px,transparent 1px);background-size:44px 44px}
.glow{position:absolute;border-radius:50%;filter:blur(120px);background:rgba(217,255,77,.16)}
.wm{font-weight:900;letter-spacing:-.02em;text-transform:uppercase}.lime{color:#D9FF4D}
.tag{font-family:ui-monospace,Menlo,monospace;text-transform:uppercase;letter-spacing:.34em;color:#9aa088}</style></head><body><div class="stage"><div class="grid" style="opacity:.5"></div>
<div class="glow" style="width:680px;height:360px;left:40px;top:64px"></div>
<svg style="position:absolute;left:0;top:0" width="1500" height="500" viewBox="0 0 1500 500">
<path d="M90 420 Q820 300 1420 120" fill="none" stroke="#D9FF4D" stroke-width="3" stroke-dasharray="2 12" stroke-linecap="round" opacity=".7"/>
<g transform="translate(1420,120) rotate(-18)"><path d="M-24 0 H18 M8 -8 L20 0 L8 8" stroke="#D9FF4D" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
</svg>
<div style="position:absolute;left:80px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center;gap:20px">
<div class="wm lime" style="font-size:34px;letter-spacing:.02em">ROBINX</div>
<div class="wm" style="font-size:92px;line-height:.88">DRAW THE BOW.<br><span class="lime">HIT THE MARK.</span></div>
<div class="tag" style="font-size:18px;margin-top:6px">Hold the token · Get paid in stocks · Every 30 min</div>
</div></div></body></html>
