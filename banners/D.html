<!doctype html><html><head><meta charset="utf-8"><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased}
.stage{width:1500px;height:500px;position:relative;overflow:hidden;background:#0A0B05;color:#fff}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(217,255,77,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(217,255,77,.05) 1px,transparent 1px);background-size:44px 44px}
.glow{position:absolute;border-radius:50%;filter:blur(120px);background:rgba(217,255,77,.16)}
.wm{font-weight:900;letter-spacing:-.02em;text-transform:uppercase}
.lime{color:#D9FF4D}.mut{color:#8a8f7a}
.chip{display:inline-flex;align-items:center;gap:8px;border:2px solid rgba(217,255,77,.3);border-radius:8px;padding:8px 14px;font-family:ui-monospace,Menlo,monospace;font-size:15px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#D9FF4D}
.pill{display:inline-flex;align-items:center;gap:6px;background:rgba(217,255,77,.08);border:1.5px solid rgba(217,255,77,.4);border-radius:999px;padding:7px 16px;font-family:ui-monospace,Menlo,monospace;font-size:16px;font-weight:700;color:#D9FF4D}</style></head><body><div class="stage"><div class="grid"></div>
<div class="glow" style="width:520px;height:520px;right:80px;top:50%;transform:translate(0,-50%)"></div>
<svg style="position:absolute;right:120px;top:50%;transform:translateY(-50%)" width="360" height="360" viewBox="0 0 360 360">
<circle cx="180" cy="180" r="150" fill="none" stroke="#D9FF4D" stroke-width="2" opacity=".25"/>
<circle cx="180" cy="180" r="110" fill="none" stroke="#D9FF4D" stroke-width="2" opacity=".4"/>
<circle cx="180" cy="180" r="70" fill="none" stroke="#D9FF4D" stroke-width="2" opacity=".65"/>
<circle cx="180" cy="180" r="30" fill="#D9FF4D" opacity=".2"/><circle cx="180" cy="180" r="12" fill="#D9FF4D"/>
</svg>
<svg style="position:absolute;left:0;top:0" width="1500" height="500" viewBox="0 0 1500 500">
<path d="M120 430 Q760 40 1198 300" fill="none" stroke="#D9FF4D" stroke-width="3.5" stroke-dasharray="2 12" stroke-linecap="round" opacity=".8"/>
<g transform="translate(1198,300) rotate(38)"><path d="M-26 0 L18 0 M8 -9 L22 0 L8 9" stroke="#D9FF4D" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
</svg>
<div style="position:absolute;left:80px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center;gap:24px">
<div class="chip" style="align-self:flex-start">● Robinhood Chain</div>
<div class="wm" style="font-size:100px;line-height:.9">ROBIN<span class="lime">X</span><span class="lime">.</span></div>
<div style="font-size:29px;font-weight:600;color:#d7dbc9;max-width:640px">Hold the token. Get paid in <span class="lime">real stocks</span> — every 30 minutes.</div>
<div style="display:flex;gap:10px"><span class="pill">TSLA</span><span class="pill">NVDA</span><span class="pill">SPCX</span></div>
</div></div></body></html>
