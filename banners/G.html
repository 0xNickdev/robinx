<!doctype html><html><head><meta charset="utf-8"><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased}
.stage{width:1500px;height:500px;position:relative;overflow:hidden;background:#0A0B05;color:#fff}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(217,255,77,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(217,255,77,.05) 1px,transparent 1px);background-size:44px 44px}
.glow{position:absolute;border-radius:50%;filter:blur(120px);background:rgba(217,255,77,.16)}
.wm{font-weight:900;letter-spacing:-.02em;text-transform:uppercase}.lime{color:#D9FF4D}
.tag{font-family:ui-monospace,Menlo,monospace;text-transform:uppercase;letter-spacing:.34em;color:#9aa088}</style></head><body><div class="stage" style="background:radial-gradient(1100px 520px at 50% 46%,#12150c,#0A0B05 72%)"><div class="grid" style="opacity:.55"></div>
<div class="glow" style="width:520px;height:420px;left:50%;top:46%;transform:translate(-50%,-50%)"></div>
<svg style="position:absolute;left:0;top:0" width="1500" height="500" viewBox="0 0 1500 500">
<path d="M150 250 H1300" stroke="#D9FF4D" stroke-width="2" stroke-dasharray="2 11" opacity=".45"/>
<circle cx="1300" cy="250" r="46" fill="none" stroke="#D9FF4D" stroke-width="2" opacity=".4"/>
<circle cx="1300" cy="250" r="22" fill="none" stroke="#D9FF4D" stroke-width="2" opacity=".7"/>
<circle cx="1300" cy="250" r="8" fill="#D9FF4D"/>
<g transform="translate(1256,250)"><path d="M-22 0 H18 M8 -8 L20 0 L8 8" stroke="#D9FF4D" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
</svg>
<div style="position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center">
<div class="wm" style="font-size:118px;line-height:.9;text-shadow:0 0 40px rgba(217,255,77,.25)">ROBIN<span class="lime">X</span></div>
<div class="tag" style="font-size:22px;margin-top:22px">Draw the bow &nbsp;·&nbsp; Hit the mark</div>
</div></div></body></html>
