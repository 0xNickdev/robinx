<!doctype html><html><head><meta charset="utf-8"><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased}
.stage{width:1500px;height:500px;position:relative;overflow:hidden;background:#0A0B05;color:#fff}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(217,255,77,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(217,255,77,.05) 1px,transparent 1px);background-size:44px 44px}
.glow{position:absolute;border-radius:50%;filter:blur(120px);background:rgba(217,255,77,.16)}
.wm{font-weight:900;letter-spacing:-.02em;text-transform:uppercase}
.lime{color:#D9FF4D}.mut{color:#8a8f7a}
.chip{display:inline-flex;align-items:center;gap:8px;border:2px solid rgba(217,255,77,.3);border-radius:8px;padding:8px 14px;font-family:ui-monospace,Menlo,monospace;font-size:15px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#D9FF4D}
.pill{display:inline-flex;align-items:center;gap:6px;background:rgba(217,255,77,.08);border:1.5px solid rgba(217,255,77,.4);border-radius:999px;padding:7px 16px;font-family:ui-monospace,Menlo,monospace;font-size:16px;font-weight:700;color:#D9FF4D}</style></head><body><div class="stage"><div class="grid"></div>
<div class="glow" style="width:460px;height:460px;left:50%;top:50%;transform:translate(-50%,-50%)"></div>
<svg style="position:absolute;left:0;top:0" width="1500" height="500" viewBox="0 0 1500 500">
<path d="M300 250 H620" stroke="#D9FF4D" stroke-width="2.5" stroke-dasharray="2 10" opacity=".6"/>
<path d="M880 250 H1120 M880 250 C1000 250 1020 150 1120 150 M880 250 C1000 250 1020 350 1120 350" stroke="#D9FF4D" stroke-width="2.5" stroke-dasharray="2 10" fill="none" opacity=".6"/>
</svg>
<div style="position:absolute;left:110px;top:50%;transform:translateY(-50%);text-align:center">
<div class="wm lime" style="font-size:34px">ROBX</div><div class="mut" style="font-family:ui-monospace,Menlo,monospace;font-size:13px;letter-spacing:.2em;margin-top:6px">HOLD</div></div>
<div style="position:absolute;left:620px;top:50%;transform:translateY(-50%);width:260px;text-align:center;padding:26px 0;border:2px solid rgba(217,255,77,.4);border-radius:16px;background:rgba(217,255,77,.06)">
<div class="wm" style="font-size:26px">TREASURY</div><div class="lime" style="font-family:ui-monospace,Menlo,monospace;font-size:14px;letter-spacing:.14em;margin-top:6px">4% TAX · EVERY 30 MIN</div></div>
<div style="position:absolute;left:1150px;top:150px;transform:translateY(-50%)"><span class="pill">TSLA</span></div>
<div style="position:absolute;left:1150px;top:250px;transform:translateY(-50%)"><span class="pill">NVDA</span></div>
<div style="position:absolute;left:1150px;top:350px;transform:translateY(-50%)"><span class="pill">SPCX</span></div>
<div style="position:absolute;left:80px;top:44px"><div class="wm" style="font-size:40px">ROBIN<span class="lime">X</span> <span style="font-size:22px;font-weight:600;color:#8a8f7a">· get paid in stocks</span></div></div>
</div></body></html>
