<!doctype html><html><head><meta charset="utf-8"><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased}
.stage{width:1500px;height:500px;position:relative;overflow:hidden;background:#0A0B05;color:#fff}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(217,255,77,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(217,255,77,.045) 1px,transparent 1px);background-size:46px 46px}
.vig{position:absolute;inset:0;background:radial-gradient(1100px 560px at 50% 44%,transparent 55%,rgba(0,0,0,.55))}
.wm{font-weight:900;letter-spacing:-.02em;text-transform:uppercase}
.lime{color:#D9FF4D}
.mono{font-family:ui-monospace,Menlo,monospace}
.step{font-family:ui-monospace,Menlo,monospace;font-size:12px;font-weight:700;letter-spacing:.3em;color:#6f755f;text-transform:uppercase}
.node{position:absolute;transform:translateY(-50%);border-radius:18px;background:linear-gradient(180deg,rgba(217,255,77,.09),rgba(217,255,77,.03));border:1px solid rgba(217,255,77,.5);box-shadow:0 0 0 1px rgba(217,255,77,.12),0 0 46px rgba(217,255,77,.12),inset 0 1px 0 rgba(255,255,255,.08)}
.pill{display:flex;align-items:center;justify-content:space-between;gap:18px;width:240px;border-radius:14px;padding:14px 18px;background:linear-gradient(180deg,rgba(217,255,77,.08),rgba(217,255,77,.02));border:1px solid rgba(217,255,77,.45);box-shadow:0 0 26px rgba(217,255,77,.08),inset 0 1px 0 rgba(255,255,255,.07)}
.pill b{font-family:ui-monospace,Menlo,monospace;font-size:19px;color:#D9FF4D;letter-spacing:.02em}
.pill span{font-size:13px;color:#9aa088;font-weight:600}</style></head><body><div class="stage" style="background:linear-gradient(180deg,#0d0f07,#0A0B05)">
<div class="grid" style="opacity:.7"></div>
<div style="position:absolute;width:900px;height:340px;left:50%;top:60%;transform:translate(-50%,-50%);filter:blur(150px);background:rgba(217,255,77,.08)"></div>
<svg style="position:absolute;left:0;top:0" width="1500" height="500" viewBox="0 0 1500 500">
<defs>
<linearGradient id="f1" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#D9FF4D" stop-opacity=".05"/><stop offset=".5" stop-color="#D9FF4D" stop-opacity=".75"/><stop offset="1" stop-color="#D9FF4D" stop-opacity=".95"/>
</linearGradient>
<marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0 0L10 5L0 10z" fill="#D9FF4D"/></marker>
</defs>
<path d="M368 278 H600" stroke="url(#f1)" stroke-width="2.5" marker-end="url(#ah)"/>
<path d="M905 278 C1030 278 1050 168 1168 168" fill="none" stroke="url(#f1)" stroke-width="2.5" marker-end="url(#ah)"/>
<path d="M905 278 H1168" stroke="url(#f1)" stroke-width="2.5" marker-end="url(#ah)"/>
<path d="M905 278 C1030 278 1050 388 1168 388" fill="none" stroke="url(#f1)" stroke-width="2.5" marker-end="url(#ah)"/>
</svg>
<div style="position:absolute;left:0;right:0;top:52px;text-align:center">
<div class="wm" style="font-size:52px">ROBIN<span class="lime">X</span></div>
<div class="mono" style="font-size:14px;letter-spacing:.42em;color:#9aa088;text-transform:uppercase;margin-top:10px">The stock rewards protocol</div>
</div>
<div class="node" style="left:150px;top:278px;width:218px;padding:22px 0;text-align:center">
<div class="step" style="margin-bottom:8px">01 · Hold</div>
<div class="wm lime" style="font-size:34px">ROBX</div>
</div>
<div class="node" style="left:600px;top:278px;width:305px;padding:24px 0;text-align:center">
<div class="step" style="margin-bottom:8px">02 · Collect</div>
<div class="wm" style="font-size:28px">TREASURY</div>
<div class="mono" style="font-size:14px;letter-spacing:.16em;color:#D9FF4D;margin-top:8px">4% TAX · EVERY 30 MIN</div>
</div>
<div style="position:absolute;left:1168px;top:168px;transform:translateY(-50%)"><div class="pill"><b>tTSLA</b><span>Tesla</span></div></div>
<div style="position:absolute;left:1168px;top:278px;transform:translateY(-50%)"><div class="pill"><b>tNVDA</b><span>NVIDIA</span></div></div>
<div style="position:absolute;left:1168px;top:388px;transform:translateY(-50%)"><div class="pill"><b>tSPCX</b><span>SpaceX</span></div></div>
<div class="vig"></div>
</div></body></html>
