<!doctype html><html><head><meta charset="utf-8"><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased}
.stage{width:1500px;height:500px;position:relative;overflow:hidden;background:#0A0B05;color:#fff}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(217,255,77,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(217,255,77,.05) 1px,transparent 1px);background-size:44px 44px}
.glow{position:absolute;border-radius:50%;filter:blur(120px);background:rgba(217,255,77,.16)}
.wm{font-weight:900;letter-spacing:-.02em;text-transform:uppercase}.lime{color:#D9FF4D}
.tag{font-family:ui-monospace,Menlo,monospace;text-transform:uppercase;letter-spacing:.34em;color:#9aa088}</style></head><body><div class="stage"><div class="grid"></div>
<div class="glow" style="width:520px;height:520px;left:120px;top:50%;transform:translateY(-50%)"></div>
<svg style="position:absolute;left:110px;top:50%;transform:translateY(-50%)" width="380" height="380" viewBox="0 0 380 380">
<circle cx="190" cy="190" r="165" fill="none" stroke="#D9FF4D" stroke-width="2" opacity=".2"/>
<circle cx="190" cy="190" r="122" fill="none" stroke="#D9FF4D" stroke-width="2" opacity=".35"/>
<circle cx="190" cy="190" r="80" fill="none" stroke="#D9FF4D" stroke-width="2" opacity=".55"/>
<circle cx="190" cy="190" r="38" fill="#D9FF4D" opacity=".18"/><circle cx="190" cy="190" r="14" fill="#D9FF4D"/>
<g transform="translate(60,70) rotate(34)"><path d="M0 0 H150 M138 -9 L154 0 L138 9" stroke="#D9FF4D" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/></g>
</svg>
<div style="position:absolute;right:110px;top:50%;transform:translateY(-50%);text-align:right">
<div class="wm" style="font-size:104px;line-height:.9">ROBIN<span class="lime">X</span><span class="lime">.</span></div>
<div class="tag" style="font-size:21px;margin-top:20px">Draw the bow · Hit the mark</div>
</div></div></body></html>
